name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: ''
          - goos: linux
            goarch: arm64
            suffix: ''
          - goos: linux
            goarch: arm
            goarm: '7'
            suffix: ''
          - goos: darwin
            goarch: amd64
            suffix: ''
          - goos: darwin
            goarch: arm64
            suffix: ''
          - goos: windows
            goarch: amd64
            suffix: '.exe'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
          CGO_ENABLED: '0'
        run: |
          BINARY_NAME=mijia-api-${{ matrix.goos }}-${{ matrix.goarch }}
          if [ "${{ matrix.goarm }}" != "" ]; then
            BINARY_NAME=mijia-api-${{ matrix.goos }}-${{ matrix.goarch }}v${{ matrix.goarm }}
          fi
          go build -ldflags="-s -w" -o dist/${BINARY_NAME}${{ matrix.suffix }} ./cmd/mijia

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mijia-api-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.goarm }}
          path: dist/

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/mijia-api-*
